# Local Docker run of the API (the database is MongoDB Atlas — nothing to host here).
# Mirrors the Render image, so "works in compose" == "works on Render".
services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PORT: 8000
    restart: unless-stopped
