services:
  - type: web
    name: paperpilot-api
    runtime: docker
    plan: free
    region: singapore
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /api/
    envVars:
      # --- secrets: set these in the Render dashboard (sync:false = not in git) ---
      - key: MONGO_URL          # mongodb+srv://... (MongoDB Atlas)
        sync: false
      - key: GROQ_API_KEY       # gsk_... from console.groq.com
        sync: false
      # Comma-separated. MUST include your Vercel URL, e.g.
      #   https://paperpilot.vercel.app
      - key: CORS_ORIGINS
        sync: false

      # --- generated once by Render, then stable (keeps logins alive) ---
      - key: SECRET_KEY
        generateValue: true

      # --- plain config ---
      - key: DB_NAME
        value: eduassist_db      # internal db name kept as-is so existing data isn't orphaned
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
      # NOTE: do NOT set PORT — Render injects it and the Dockerfile binds to it.
